<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>アラート一覧 - 在庫管理</title>
    <meta name="theme-color" content="#f5f5f5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container app-container">
        <!-- ヘッダー（戻るボタン付き） -->
        <header class="detail-header">
            <a href="index.html" class="back-link"><i class="bi bi-chevron-left"></i> 戻る</a>
        </header>

        <h1 class="alert-page-title">要注意アイテム</h1>
        <p class="alert-page-subtitle">要発注・在庫少の品目をまとめて表示</p>

        <!-- 要発注セクション -->
        <section class="alert-section">
            <h2 class="alert-section-title section-title-red">
                <span class="status-dot dot-red"></span>要発注（2件）
            </h2>
            <ul class="inventory-list">
                <li class="inventory-item" onclick="location.href='detail.html'">
                    <div class="item-status">
                        <span class="status-dot dot-red"></span>
                    </div>
                    <div class="item-info">
                        <span class="item-name">いちご</span>
                        <span class="item-sub">食材 / 日配品</span>
                    </div>
                    <div class="item-qty">3パック</div>
                    <div class="item-badge">
                        <span class="badge badge-expiry">期限近</span>
                    </div>
                </li>
                <li class="inventory-item" onclick="location.href='detail.html'">
                    <div class="item-status">
                        <span class="status-dot dot-red"></span>
                    </div>
                    <div class="item-info">
                        <span class="item-name">ミネラルウォーター</span>
                        <span class="item-sub">食材 / 月次品</span>
                    </div>
                    <div class="item-qty">2本</div>
                    <div class="item-badge">
                        <span class="badge badge-expiry">要発注</span>
                    </div>
                </li>
            </ul>
        </section>

        <!-- 在庫少セクション -->
        <section class="alert-section">
            <h2 class="alert-section-title section-title-yellow">
                <span class="status-dot dot-yellow"></span>在庫少（3件）
            </h2>
            <ul class="inventory-list">
                <li class="inventory-item" onclick="location.href='detail.html'">
                    <div class="item-status">
                        <span class="status-dot dot-yellow"></span>
                    </div>
                    <div class="item-info">
                        <span class="item-name">生クリーム</span>
                        <span class="item-sub">食材 / 日配品</span>
                    </div>
                    <div class="item-qty">2パック</div>
                    <div class="item-badge">
                        <span class="badge badge-low">残少</span>
                    </div>
                </li>
                <li class="inventory-item" onclick="location.href='detail.html'">
                    <div class="item-status">
                        <span class="status-dot dot-yellow"></span>
                    </div>
                    <div class="item-info">
                        <span class="item-name">モカ豆</span>
                        <span class="item-sub">コーヒー豆 / 週次品</span>
                    </div>
                    <div class="item-qty">1kg</div>
                    <div class="item-badge">
                        <span class="badge badge-low">残少</span>
                    </div>
                </li>
                <li class="inventory-item" onclick="location.href='detail.html'">
                    <div class="item-status">
                        <span class="status-dot dot-yellow"></span>
                    </div>
                    <div class="item-info">
                        <span class="item-name">コーヒーフィルター</span>
                        <span class="item-sub">消耗品 / 週次品</span>
                    </div>
                    <div class="item-qty">20枚</div>
                    <div class="item-badge">
                        <span class="badge badge-low">残少</span>
                    </div>
                </li>
            </ul>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
