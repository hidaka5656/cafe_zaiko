<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>アラート一覧 - 在庫管理</title>
    <meta name="theme-color" content="#f5f5f5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container app-container">
        <!-- ヘッダー（戻るボタン付き） -->
        <header class="detail-header">
            <a href="index.html" class="back-link"><i class="bi bi-chevron-left"></i> 戻る</a>
        </header>

        <h1 class="alert-page-title">要注意アイテム</h1>
        <p class="alert-page-subtitle">要発注・在庫少の品目をまとめて表示</p>

        <!-- 要発注セクション -->
        <section class="alert-section">
            <h2 class="alert-section-title section-title-red" id="order-title">
                <span class="status-dot dot-red"></span>要発注（0件）
            </h2>
            <ul class="inventory-list" id="order-list"></ul>
        </section>

        <!-- 在庫少セクション -->
        <section class="alert-section">
            <h2 class="alert-section-title section-title-yellow" id="low-title">
                <span class="status-dot dot-yellow"></span>在庫少（0件）
            </h2>
            <ul class="inventory-list" id="low-list"></ul>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        const items = loadItems();
        const orderItems = items.filter(i => i.badge === '要発注' || i.badge === '期限近');
        const lowItems = items.filter(i => i.badge === '残少');

        document.getElementById('order-title').innerHTML =
            '<span class="status-dot dot-red"></span>要発注（' + orderItems.length + '件）';
        document.getElementById('low-title').innerHTML =
            '<span class="status-dot dot-yellow"></span>在庫少（' + lowItems.length + '件）';

        function renderAlertList(listEl, arr, dotColor) {
            arr.forEach(item => {
                const li = document.createElement('li');
                li.className = 'inventory-item';
                li.onclick = () => location.href = 'detail.html?item=' + encodeURIComponent(item.name);
                li.innerHTML = `
                    <div class="item-status">
                        <span class="status-dot dot-${dotColor}"></span>
                    </div>
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-sub">${item.category} / ${item.group}</span>
                    </div>
                    <div class="item-qty">${item.qty}${item.unit}</div>
                    <div class="item-badge">
                        <span class="badge ${item.badgeClass}">${item.badge}</span>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        renderAlertList(document.getElementById('order-list'), orderItems, 'red');
        renderAlertList(document.getElementById('low-list'), lowItems, 'yellow');
    </script>
</body>
</html>
