<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>品目詳細 - 在庫管理</title>
    <meta name="theme-color" content="#f5f5f5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container app-container">
        <!-- ヘッダー（戻るボタン付き） -->
        <header class="detail-header">
            <a href="index.html" class="back-link"><i class="bi bi-chevron-left"></i> 戻る</a>
        </header>

        <!-- 品目名・カテゴリ -->
        <div class="detail-title-section">
            <h1 class="detail-item-name" id="item-name">---</h1>
            <p class="detail-category" id="item-category">---</p>
        </div>

        <!-- 数量コントロール -->
        <div class="qty-control">
            <button class="qty-btn qty-minus" id="btn-minus">－</button>
            <div class="qty-display">
                <span class="qty-number" id="qty-number">0</span>
                <span class="qty-unit" id="qty-unit">個</span>
            </div>
            <button class="qty-btn qty-plus" id="btn-plus">＋</button>
        </div>

        <!-- 詳細情報 -->
        <div class="detail-info-list">
            <div class="detail-info-row">
                <span class="detail-info-label">入庫日</span>
                <span class="detail-info-value" id="info-stocked">---</span>
            </div>
            <div class="detail-info-row">
                <span class="detail-info-label">最低在庫</span>
                <span class="detail-info-value" id="info-minstock">---</span>
            </div>
            <div class="detail-info-row">
                <span class="detail-info-label">消費期限の目安</span>
                <span class="detail-info-value" id="info-expiry">---</span>
            </div>
            <div class="detail-info-row">
                <span class="detail-info-label">発注グループ</span>
                <span class="detail-info-value" id="info-group">---</span>
            </div>
            <div class="detail-info-row">
                <span class="detail-info-label">入庫者</span>
                <span class="detail-info-value" id="info-stockedby">---</span>
            </div>
            <div class="detail-info-row">
                <span class="detail-info-label">最終更新</span>
                <span class="detail-info-value" id="info-updated">---</span>
            </div>
        </div>

        <!-- 更新者の選択 -->
        <div class="staff-select-section">
            <label class="staff-select-label">更新者を選択</label>
            <div class="staff-select-buttons" id="staff-buttons"></div>
        </div>

        <!-- ボタン -->
        <div class="detail-actions">
            <a href="index.html" class="btn-cancel">キャンセル</a>
            <button class="btn-save" id="btn-save">保存する</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // URLパラメータから品目名を取得
        const params = new URLSearchParams(window.location.search);
        const itemName = params.get('item');
        const item = itemName ? getItem(itemName) : null;

        if (!item) {
            alert('品目が見つかりません');
            window.location.href = 'index.html';
        }

        // 画面にデータを表示
        document.getElementById('item-name').textContent = item.name;
        document.getElementById('item-category').textContent = item.category + ' / ' + item.group;
        document.getElementById('qty-number').textContent = item.qty;
        document.getElementById('qty-unit').textContent = item.unit;
        document.getElementById('info-stocked').textContent = item.stocked;
        document.getElementById('info-minstock').textContent = item.minStock + item.unit;
        document.getElementById('info-expiry').textContent = item.expiry;
        document.getElementById('info-group').textContent = item.group;
        document.getElementById('info-updated').textContent = item.lastUpdated || '---';
        document.getElementById('info-stockedby').textContent = item.stockedBy || '---';
        document.title = item.name + ' - 在庫管理';

        // 更新者ボタンを生成
        let selectedStaff = item.stockedBy || STAFF_LIST[0];
        const staffContainer = document.getElementById('staff-buttons');
        STAFF_LIST.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'staff-btn' + (name === selectedStaff ? ' active' : '');
            btn.textContent = name;
            btn.addEventListener('click', function () {
                staffContainer.querySelectorAll('.staff-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedStaff = name;
            });
            staffContainer.appendChild(btn);
        });

        // 数量の増減
        const qtyNumber = document.getElementById('qty-number');
        let qty = item.qty;

        document.getElementById('btn-minus').addEventListener('click', function () {
            if (qty > 0) {
                qty--;
                qtyNumber.textContent = qty;
            }
        });

        document.getElementById('btn-plus').addEventListener('click', function () {
            qty++;
            qtyNumber.textContent = qty;
        });

        // 保存ボタン → localStorageに書き込み
        document.getElementById('btn-save').addEventListener('click', function () {
            const now = new Date();
            const timeStr = now.getMonth() + 1 + '/' + now.getDate() + ' ' +
                            now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
            updateItem(item.name, { qty: qty, stockedBy: selectedStaff, lastUpdated: timeStr + ' ' + selectedStaff });
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
