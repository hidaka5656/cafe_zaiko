<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>喫茶店の在庫管理</title>

    <!-- OGP / Twitter Card -->
    <meta property="og:title" content="喫茶店の在庫管理アプリ">
    <meta property="og:description" content="老舗喫茶店の在庫をスマホで誰でも簡単に管理。在庫切れ・発注タイミングを逃さない。">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="喫茶店の在庫管理アプリ">
    <meta name="twitter:description" content="老舗喫茶店の在庫をスマホで誰でも簡単に管理。在庫切れ・発注タイミングを逃さない。">

    <!-- モバイル最適化 -->
    <meta name="theme-color" content="#f5f5f5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container app-container top-page">
        <!-- ロゴ・タイトル -->
        <div class="top-hero">
            <div class="top-icon"><i class="bi bi-cup-hot-fill"></i></div>
            <h1 class="top-title">喫茶店の在庫管理</h1>
            <p class="top-subtitle">スマホで簡単に在庫チェック</p>
        </div>

        <!-- サマリー -->
        <div class="top-summary" id="top-summary">
            <div class="top-summary-item">
                <span class="top-summary-number" id="sum-total">--</span>
                <span class="top-summary-label">品目数</span>
            </div>
            <div class="top-summary-item top-summary-warn">
                <span class="top-summary-number" id="sum-alert">--</span>
                <span class="top-summary-label">要注意</span>
            </div>
        </div>

        <!-- メニューボタン -->
        <div class="top-menu">
            <a href="inventory.html" class="top-menu-card">
                <i class="bi bi-box-seam"></i>
                <span class="top-menu-label">在庫一覧</span>
                <span class="top-menu-desc">全品目の在庫を確認・更新</span>
            </a>
            <a href="alerts.html" class="top-menu-card top-menu-alert">
                <i class="bi bi-exclamation-triangle"></i>
                <span class="top-menu-label">要注意アイテム</span>
                <span class="top-menu-desc">要発注・在庫少をまとめて確認</span>
            </a>
        </div>

        <!-- フッター -->
        <p class="top-footer">開発中 — ご意見・ご感想は X で</p>
    </div>

    <script src="js/app.js"></script>
    <script>
        const items = loadItems();
        const summary = calcSummary(items);
        document.getElementById('sum-total').textContent = summary.total;
        document.getElementById('sum-alert').textContent = summary.lowCount;
    </script>
</body>
</html>
