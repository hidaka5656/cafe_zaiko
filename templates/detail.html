<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>品目詳細 - 在庫管理</title>
    <meta name="theme-color" content="#f5f5f5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container app-container">
        <!-- ヘッダー（戻るボタン付き） -->
        <header class="detail-header">
            <a href="/" class="back-link"><i class="bi bi-chevron-left"></i> 戻る</a>
        </header>

        <!-- 品目名・カテゴリ -->
        <div class="detail-title-section">
            <h1 class="detail-item-name">いちご</h1>
            <p class="detail-category">食材 / 日配品</p>
        </div>

        <!-- 数量コントロール -->
        <div class="qty-control">
            <button class="qty-btn qty-minus" id="btn-minus">－</button>
            <div class="qty-display">
                <span class="qty-number" id="qty-number">3</span>
                <span class="qty-unit">パック</span>
            </div>
            <button class="qty-btn qty-plus" id="btn-plus">＋</button>
        </div>

        <!-- 詳細情報 -->
        <div class="detail-info-list">
            <div class="detail-info-row">
                <span class="detail-info-label">最低在庫</span>
                <span class="detail-info-value">2パック</span>
            </div>
            <div class="detail-info-row">
                <span class="detail-info-label">消費期限の目安</span>
                <span class="detail-info-value value-warn">2〜3日</span>
            </div>
            <div class="detail-info-row">
                <span class="detail-info-label">発注グループ</span>
                <span class="detail-info-value">日配品</span>
            </div>
            <div class="detail-info-row">
                <span class="detail-info-label">最終更新</span>
                <span class="detail-info-value">今日 8:45</span>
            </div>
            <div class="detail-info-row">
                <span class="detail-info-label">更新者</span>
                <span class="detail-info-value">店主</span>
            </div>
        </div>

        <!-- ボタン -->
        <div class="detail-actions">
            <a href="/" class="btn-cancel">キャンセル</a>
            <button class="btn-save" id="btn-save">保存する</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 数量の増減
        const qtyNumber = document.getElementById('qty-number');
        let qty = parseInt(qtyNumber.textContent);

        document.getElementById('btn-minus').addEventListener('click', function () {
            if (qty > 0) {
                qty--;
                qtyNumber.textContent = qty;
            }
        });

        document.getElementById('btn-plus').addEventListener('click', function () {
            qty++;
            qtyNumber.textContent = qty;
        });

        // 保存ボタン（静的なのでアラートで仮対応）
        document.getElementById('btn-save').addEventListener('click', function () {
            alert('保存しました（仮）：いちご ' + qty + 'パック');
            window.location.href = '/';
        });
    </script>
</body>
</html>
